name: directory-sync

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC = 05:00 BRT (madrugada)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Só simular (não grava no Confluence)"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências
        run: pip install -r skills/workspace-directory-sync/scripts/requirements.txt
      - name: Sincronizar Diretório
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          GOOGLE_ADMIN_EMAIL: ${{ secrets.GOOGLE_ADMIN_EMAIL }}
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_PAGE_ID: ${{ secrets.CONFLUENCE_PAGE_ID }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: python skills/workspace-directory-sync/scripts/sync_directory.py
